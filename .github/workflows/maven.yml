# Java CI with Maven - Full Pipeline
# Flow: build + security-check (parallel) → test → sonarqube scan

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Build the project
  # ─────────────────────────────────────────
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

  # ─────────────────────────────────────────
  # JOB 2: Security checks (runs in parallel with build)
  # ─────────────────────────────────────────
  security-check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy filesystem scan
        run: trivy fs --format json -o fs-report.json .

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: fs-report.json

      - name: Install Gitleaks
        run: sudo apt install gitleaks -y

      - name: Gitleaks secret scan
        run: gitleaks detect --source . -r gitleaks-report.json -f json
        continue-on-error: true   # Reports leaks but doesn't block pipeline

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # ─────────────────────────────────────────
  # JOB 3: Run unit tests
  # Waits for BOTH build AND security-check
  # ─────────────────────────────────────────
  test:
    runs-on: self-hosted
    needs: [build, security-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test

  # ─────────────────────────────────────────
  # JOB 4: SonarQube scan + Quality Gate
  # Waits for tests to pass
  # ─────────────────────────────────────────
  build_project_and_scan_sonarqube:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for accurate SonarQube analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build project (skip tests, already ran)
        run: mvn package -DskipTests

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
